<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matthew Henson's Arctic Adventures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="512" height="480"></canvas>
        <div id="overlay" class="overlay">
            <div id="title-screen" class="screen active">
                <h1>Matthew Henson's<br>Arctic Adventures</h1>
                <p class="subtitle">The Quest for the North Pole</p>
                <p class="press-start">Press ENTER to Start</p>
                <p class="controls-hint">Arrow Keys to Move | SPACE to Interact</p>
            </div>
            <div id="story-screen" class="screen">
                <div id="story-text"></div>
                <p class="press-start">Press ENTER to Continue</p>
            </div>
            <div id="level-complete-screen" class="screen">
                <h2 id="level-complete-title"></h2>
                <p id="level-complete-text"></p>
                <p class="press-start">Press ENTER to Continue</p>
            </div>
            <div id="win-screen" class="screen">
                <h1>Victory!</h1>
                <p id="win-text"></p>
                <p class="press-start">Press ENTER to Play Again</p>
            </div>
        </div>
        <div id="hud">
            <div id="hud-level">Level 1: The Ship</div>
            <div id="hud-items"></div>
        </div>
    </div>
    <script src="sprites.js"></script>
    <script src="levels.js"></script>
    <script src="game.js"></script>
</body>
</html>
